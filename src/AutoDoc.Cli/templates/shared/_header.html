<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — AutoDoc</title>
  <link rel="stylesheet" href="{{ relative_path_to_root }}shared/styles.css">
</head>
<body>

<header class="site-header">
  <a class="logo" href="{{ relative_path_to_root }}index.html">AutoDoc</a>
  <span class="environment-badge">{{ environment_name }}</span>
</header>

{{- if breadcrumbs && breadcrumbs.size > 0 }}
<nav class="breadcrumb" aria-label="Breadcrumb">
  {{- for crumb in breadcrumbs }}
    {{- if !for.first }}<span class="sep">›</span>{{ end }}
    {{- if crumb.url }}<a href="{{ crumb.url }}">{{ crumb.label }}</a>
    {{- else }}<span>{{ crumb.label }}</span>
    {{- end }}
  {{- end }}
</nav>
{{- end }}

<main class="main-content">
